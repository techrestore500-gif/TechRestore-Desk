services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tech-restore-backend
    env_file:
      - ./.env
    environment:
      TECH_RESTORE_APP_ENV: ${TECH_RESTORE_APP_ENV:-development}
      TECH_RESTORE_AUTH_BYPASS: ${TECH_RESTORE_AUTH_BYPASS:-1}
      TECH_RESTORE_JWT_SECRET: ${TECH_RESTORE_JWT_SECRET:-dev-insecure-secret-change-me}
      TECH_RESTORE_SIGNED_URL_SECRET: ${TECH_RESTORE_SIGNED_URL_SECRET:-dev-insecure-secret-change-me}
      TECH_RESTORE_ATTACHMENTS_PROVIDER: ${TECH_RESTORE_ATTACHMENTS_PROVIDER:-local}
      TECH_RESTORE_ATTACHMENTS_LOCAL_ROOT: /app/data/attachments
      TECH_RESTORE_LOG_LEVEL: ${TECH_RESTORE_LOG_LEVEL:-INFO}
      TECH_RESTORE_LOG_JSON: ${TECH_RESTORE_LOG_JSON:-1}
      TECH_RESTORE_CORS_ORIGINS: ${TECH_RESTORE_CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-}
      DATABASE_URL: ${DATABASE_URL:-}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-}
      PUBLIC_WEBHOOK_BASE_URL: ${PUBLIC_WEBHOOK_BASE_URL:-}
      TECH_RESTORE_SENTRY_DSN: ${TECH_RESTORE_SENTRY_DSN:-}
      TECH_RESTORE_SENTRY_TRACES_SAMPLE_RATE: ${TECH_RESTORE_SENTRY_TRACES_SAMPLE_RATE:-0}
      TECH_RESTORE_ATTACHMENTS_BUCKET: ${TECH_RESTORE_ATTACHMENTS_BUCKET:-}
      TECH_RESTORE_ATTACHMENTS_REGION: ${TECH_RESTORE_ATTACHMENTS_REGION:-}
      TECH_RESTORE_ATTACHMENTS_ENDPOINT_URL: ${TECH_RESTORE_ATTACHMENTS_ENDPOINT_URL:-}
      TECH_RESTORE_ATTACHMENTS_ACCESS_KEY_ID: ${TECH_RESTORE_ATTACHMENTS_ACCESS_KEY_ID:-}
      TECH_RESTORE_ATTACHMENTS_SECRET_ACCESS_KEY: ${TECH_RESTORE_ATTACHMENTS_SECRET_ACCESS_KEY:-}
      TECH_RESTORE_ATTACHMENTS_SIGNED_URL_TTL_SECONDS: ${TECH_RESTORE_ATTACHMENTS_SIGNED_URL_TTL_SECONDS:-900}
      TECH_RESTORE_ATTACHMENTS_MAX_FILE_SIZE_BYTES: ${TECH_RESTORE_ATTACHMENTS_MAX_FILE_SIZE_BYTES:-10485760}
      TECH_RESTORE_ATTACHMENTS_ALLOWED_MIME_TYPES: ${TECH_RESTORE_ATTACHMENTS_ALLOWED_MIME_TYPES:-image/jpeg,image/png,image/webp,application/pdf}
    volumes:
      - ./data:/app/data
      - ./backups:/app/backups
    ports:
      - "8787:8787"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tech-restore-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"
