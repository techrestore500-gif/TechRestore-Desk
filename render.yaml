services:
  - type: web
    name: tech-restore-api
    env: python
    rootDir: backend
    plan: starter
    disk:
      name: tech-restore-api-data
      mountPath: /var/data
      sizeGB: 10
    buildCommand: pip install -r requirements.txt
    startCommand: python run_server.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: APP_ENV
        value: production
      - key: REPAIR_DESK_AUTH_ENABLED
        value: true
      - key: REPAIR_DESK_PASSWORD
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: TECH_RESTORE_TWILIO_SIGNATURE_BYPASS
        value: false
      - key: FRONTEND_ORIGIN
        value: https://desk.techrestoredesk.com
      - key: FRONTEND_BASE_URL
        value: https://desk.techrestoredesk.com
      - key: PUBLIC_API_BASE_URL
        value: https://api.techrestoredesk.com
      - key: PUBLIC_BASE_URL
        value: https://api.techrestoredesk.com
      - key: CORS_ALLOWED_ORIGINS
        value: https://desk.techrestoredesk.com
      - key: DATABASE_URL
        sync: false
      - key: TECH_RESTORE_JWT_SECRET
        sync: false
      - key: TECH_RESTORE_SIGNED_URL_SECRET
        sync: false
      - key: TECH_RESTORE_DATA_ROOT
        value: /var/data
      - key: TECH_RESTORE_BACKUPS_DIR
        value: /var/data/backups
      - key: TECH_RESTORE_ATTACHMENTS_LOCAL_ROOT
        value: /var/data/attachments
      # Legacy compatibility alias (discouraged once TECH_RESTORE_JWT_SECRET is configured)
      - key: SECRET_KEY
        sync: false
      - key: FEEDBACK_PORTAL_INGEST_URL
        sync: false
      - key: FEEDBACK_PORTAL_INGEST_TOKEN
        sync: false

  - type: static
    name: tech-restore-desk
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://api.techrestoredesk.com
      - key: VITE_AUTH_ENABLED
        value: true

  - type: web
    name: tech-restore-feedback
    env: python
    rootDir: feedback_service
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: FEEDBACK_PORTAL_PASSWORD
        sync: false
      - key: FEEDBACK_PORTAL_SESSION_SECRET
        sync: false
      - key: FEEDBACK_PORTAL_INGEST_TOKEN
        sync: false
